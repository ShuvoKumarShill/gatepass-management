{% extends 'gatepass/base.html' %}
{% load static %}
{% block content %}
<h1>Create Gate Pass</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

</form>
<a href="{% url 'gatepass_list' %}">Back to Gate Pass List</a>
{% endblock %}
